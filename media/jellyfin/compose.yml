services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: "1000:1001"
    network_mode: "host"
    volumes:
      - ./config:/config
      - ./cache:/cache
      - /mnt/hdd1/media:/media
    restart: "unless-stopped"

  slskd:
    image: slskd/slskd
    container_name: slskd
    user: "1000:1001"
    ports:
      - "5030:5030"
      - "5031:5031"
      - "50300:50300"
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
    volumes:
      - ./slskd_data:/app
      - /mnt/hdd1/qbittorrent:/app/qbittorrent
      - /mnt/hdd1/media/downloads:/app/downloads
      - /mnt/hdd1/media:/app/shared:ro
    restart: "unless-stopped"
